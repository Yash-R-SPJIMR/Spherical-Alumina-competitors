<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Alumina Filler — Competitive Spec Overlap</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.35.3/plotly.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{
    width:100%;height:100%;overflow:hidden;
    font-family:'Segoe UI',Arial,Helvetica,sans-serif;
    background:transparent;
  }
  #root{width:100%;height:100%;display:flex;align-items:center;justify-content:center}

  .outer{
    width:100%;max-width:960px;margin:0 auto;
    padding:24px 16px 18px;
    font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(176deg,#f7f8fb 0%,#edeef4 100%);
    border-radius:14px;position:relative;overflow:hidden;
  }
  .accent-bar{
    position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,#0077B6 0%,#E63946 33%,#2A9D8F 66%,#F4A261 100%);
    border-radius:14px 14px 0 0;
  }
  .heading{
    text-align:center;font-size:19px;font-weight:700;color:#0f172a;
    margin:0 0 5px;letter-spacing:-0.03em;
  }
  .subtitle{
    text-align:center;font-size:10.5px;color:#64748b;
    margin:0 auto 3px;line-height:1.5;max-width:540px;font-style:italic;
  }
  .tagline{
    text-align:center;font-size:10px;color:#94a3b8;margin:0 0 16px;letter-spacing:.01em;
  }
  .legend{
    display:flex;justify-content:center;flex-wrap:wrap;gap:5px 20px;margin-bottom:14px;
  }
  .legend-item{display:flex;align-items:center;gap:6px;transition:opacity .35s ease}
  .legend-swatch{
    display:inline-block;width:24px;height:9px;border-radius:5px;
  }
  .legend-label{font-size:11.5px;font-weight:600}

  .dropdown-row{display:flex;justify-content:center;margin-bottom:12px}
  .dropdown-wrap{
    display:inline-flex;align-items:center;gap:7px;
    background:#fff;border:1px solid #e2e8f0;border-radius:8px;
    padding:4px 5px 4px 12px;box-shadow:0 1px 5px rgba(15,23,42,.05);
  }
  .dropdown-label{
    font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;
    letter-spacing:.1em;white-space:nowrap;user-select:none;
  }
  .dropdown-select{
    appearance:none;-webkit-appearance:none;-moz-appearance:none;
    border:none;outline:none;
    background:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2364748b' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center;
    padding:6px 28px 6px 9px;font-size:12.5px;font-weight:600;color:#0f172a;
    cursor:pointer;font-family:'Segoe UI',Arial,sans-serif;min-width:250px;border-radius:6px;
  }

  .chart-card{
    background:#fff;border-radius:10px;border:1px solid #e2e8f0;
    box-shadow:0 1px 3px rgba(15,23,42,.04),0 4px 18px rgba(15,23,42,.03);
    padding:8px 6px 2px;transition:opacity .18s ease,transform .18s ease;
  }
  .chart-card.fading{opacity:.15;transform:scaleX(.97)}

  .null-note{
    text-align:center;font-size:10px;color:#94a3b8;margin-top:8px;font-style:italic;
  }
  .null-note span{color:#b0b8c8}

  .cards-row{
    margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;
  }
  .range-card{
    display:flex;align-items:center;gap:7px;font-size:10.5px;color:#475569;
    background:#fff;border-radius:6px;padding:5px 10px;line-height:1.3;
  }
  .range-dot{
    width:6px;height:6px;border-radius:50%;flex-shrink:0;
  }
  .range-name{font-weight:700}
  .range-val{color:#94a3b8;font-family:'Consolas','Courier New',monospace;font-size:10px}
  .range-note{
    color:#cbd5e1;font-style:italic;font-size:9.5px;max-width:140px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const MANUFACTURERS=[
  {name:"Bestry",color:"rgba(0,119,182,0.4)",solid:"#0077B6"},
  {name:"Denka",color:"rgba(230,57,70,0.4)",solid:"#E63946"},
  {name:"Admatechs",color:"rgba(42,157,143,0.4)",solid:"#2A9D8F"},
  {name:"Resonac",color:"rgba(244,162,97,0.4)",solid:"#F4A261"},
];

const SPECS=[
  {title:"Particle Size (D50, \u00b5m)",unit:"\u00b5m",log:true,data:[
    {mfr:0,min:0.5,max:122,note:"BAK series; 9 grades"},
    {mfr:1,min:0.93,max:97.4,note:""},
    {mfr:2,min:0.2,max:100,note:"VMC + Flame Fusion"},
    {mfr:3,min:3,max:97,note:"ALUNABEADS CB; 12 grades"},
  ]},
  {title:"Specific Surface Area \u2014 BET (m\u00b2/g)",unit:"m\u00b2/g",log:false,data:[
    {mfr:0,min:0.05,max:3.03,note:""},
    {mfr:1,min:0.1,max:10.8,note:""},
    {mfr:2,min:1.0,max:9.0,note:"AO-502 & AO-509 combined"},
    {mfr:3,min:0.1,max:1.1,note:""},
  ]},
  {title:"Soda Content \u2014 Na\u2082O (ppm)",unit:"ppm",log:false,data:[
    {mfr:0,min:64,max:193,note:"per grade TDS"},
    {mfr:1,min:3,max:80,note:""},
    {mfr:2,min:0,max:1,note:"Na\u207a ionic < 1 ppm"},
    {mfr:3,min:5,max:30,note:""},
  ]},
  {title:"Electrical Conductivity (\u00b5S/cm)",unit:"\u00b5S/cm",log:false,data:[
    {mfr:0,min:2.6,max:8.15,note:""},
    {mfr:1,min:5,max:117,note:""},
    {mfr:2,min:0,max:5,note:"< 5 \u00b5S/cm"},
    {mfr:3,min:4,max:48,note:""},
  ]},
  {title:"pH",unit:"",log:false,data:[
    {mfr:0,min:7.3,max:7.7,note:""},
    {mfr:2,min:4.5,max:6.0,note:""},
  ]},
];

function ellipsePath(cx,cy,rx,ry,n=80){
  let p="";
  for(let i=0;i<=n;i++){
    const t=(2*Math.PI*i)/n;
    const x=cx+rx*Math.cos(t);
    const y=cy+ry*Math.sin(t);
    p+=(i===0?"M":"L")+x.toFixed(6)+" "+y.toFixed(6);
  }
  return p+"Z";
}

const FONT="'Segoe UI',Arial,sans-serif";
const FONT_MONO="'Consolas','Courier New',monospace";

function App(){
  const containerRef=useRef(null);
  const [activeIdx,setActiveIdx]=useState(0);
  const [fade,setFade]=useState(false);

  useEffect(()=>{
    const el=containerRef.current;
    if(!el)return;
    const spec=SPECS[activeIdx];
    const validData=spec.data.filter(d=>d.min!=null&&d.max!=null);
    const allMin=Math.min(...validData.map(d=>d.min));
    const allMax=Math.max(...validData.map(d=>d.max));

    let xAxisCfg;
    if(spec.log){
      const logMin=Math.log10(Math.max(allMin,0.001));
      const logMax=Math.log10(allMax);
      const pad=(logMax-logMin)*0.15;
      xAxisCfg={type:"log",range:[logMin-pad,logMax+pad],
        title:{text:spec.title,font:{size:12,color:"#475569",family:FONT},standoff:10},
        showgrid:true,gridcolor:"rgba(148,163,184,0.15)",gridwidth:1,zeroline:false,
        tickfont:{size:9.5,color:"#94a3b8",family:FONT_MONO},
        showline:true,linecolor:"rgba(148,163,184,0.25)",linewidth:1,side:"bottom"};
    }else{
      const span=allMax-allMin||1;
      const pad=span*0.18;
      xAxisCfg={type:"linear",
        range:[allMin-pad<0&&allMin>=0?-pad*0.3:allMin-pad,allMax+pad],
        title:{text:spec.title,font:{size:12,color:"#475569",family:FONT},standoff:10},
        showgrid:true,gridcolor:"rgba(148,163,184,0.15)",gridwidth:1,zeroline:false,
        tickfont:{size:9.5,color:"#94a3b8",family:FONT_MONO},
        showline:true,linecolor:"rgba(148,163,184,0.25)",linewidth:1,side:"bottom"};
    }

    const shapes=validData.map(d=>{
      const m=MANUFACTURERS[d.mfr];
      const cx=(d.min+d.max)/2;
      const rx=(d.max-d.min)/2;
      return{type:"path",path:ellipsePath(cx,0,Math.max(rx,0.001),0.2),
        xref:"x",yref:"y",fillcolor:m.color,line:{color:m.solid,width:2},layer:"above"};
    });

    const yOffsets=[0.36,-0.36,0.50,-0.50];
    const annotations=[];
    validData.forEach((d,di)=>{
      const m=MANUFACTURERS[d.mfr];
      const yOff=yOffsets[di%yOffsets.length];
      const labelText=`<b>${m.name}</b>  ${d.min} – ${d.max}`+(spec.unit?` ${spec.unit}`:"");
      annotations.push({x:(d.min+d.max)/2,y:yOff,xref:"x",yref:"y",text:labelText,
        showarrow:true,arrowhead:0,arrowwidth:1,arrowcolor:m.solid+"55",
        ax:0,ay:yOff>0?-16:16,
        font:{size:10,color:m.solid,family:FONT},
        bgcolor:"rgba(255,255,255,0.92)",bordercolor:m.solid+"40",borderwidth:1,borderpad:4});
    });

    const traces=validData.map(d=>{
      const m=MANUFACTURERS[d.mfr];
      const pts=30;
      const step=(d.max-d.min)/Math.max(pts-1,1);
      const xs=Array.from({length:pts},(_,i)=>d.min+step*i);
      return{x:xs,y:xs.map(()=>0),mode:"markers",marker:{size:1,opacity:0},
        showlegend:false,hoverinfo:"text",
        hovertemplate:`<b>${m.name}</b><br>Range: ${d.min} – ${d.max} ${spec.unit}`+
          (d.note?`<br><i>${d.note}</i>`:"")+`<extra></extra>`};
    });

    const layout={
      height:280,
      margin:{t:12,b:54,l:18,r:18},
      paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",
      font:{family:FONT,color:"#1e293b"},showlegend:false,
      xaxis:xAxisCfg,
      yaxis:{visible:false,range:[-0.75,0.75],fixedrange:true},
      shapes,annotations,
      hoverlabel:{bgcolor:"#1e293b",bordercolor:"rgba(255,255,255,0.08)",
        font:{family:FONT,size:11,color:"#f1f5f9"}},
    };
    const config={displayModeBar:false,responsive:true,staticPlot:false};

    Plotly.purge(el);
    Plotly.newPlot(el,traces,layout,config);
    return()=>Plotly.purge(el);
  },[activeIdx]);

  const handleSelect=(e)=>{
    const next=Number(e.target.value);
    if(next===activeIdx)return;
    setFade(true);
    setTimeout(()=>{setActiveIdx(next);setTimeout(()=>setFade(false),40)},160);
  };

  const spec=SPECS[activeIdx];
  const activeMfrSet=new Set(spec.data.filter(d=>d.min!=null).map(d=>d.mfr));
  const nullMfrs=MANUFACTURERS.map((_,i)=>i).filter(i=>!activeMfrSet.has(i));

  return(
    <div className="outer">
      <div className="accent-bar"/>
      <h2 className="heading">Alumina Filler — Competitive Spec Overlap</h2>
      <p className="subtitle">
        Note: Ranges represent the combined capability across all commercial grades manufactured by each company.
      </p>
      <p className="tagline">Overlapping capsules reveal where manufacturer ranges converge</p>

      <div className="legend">
        {MANUFACTURERS.map((m,mi)=>{
          const active=activeMfrSet.has(mi);
          return(
            <div key={m.name} className="legend-item" style={{opacity:active?1:0.25}}>
              <span className="legend-swatch" style={{backgroundColor:m.color,border:`1.5px solid ${m.solid}`}}/>
              <span className="legend-label" style={{color:active?"#334155":"#b0b8c8"}}>{m.name}</span>
            </div>
          );
        })}
      </div>

      <div className="dropdown-row">
        <div className="dropdown-wrap">
          <label htmlFor="spec-sel" className="dropdown-label">Specification</label>
          <select id="spec-sel" className="dropdown-select" value={activeIdx} onChange={handleSelect}>
            {SPECS.map((s,i)=><option key={i} value={i}>{s.title}</option>)}
          </select>
        </div>
      </div>

      <div className={`chart-card${fade?" fading":""}`}>
        <div ref={containerRef} style={{width:"100%",minHeight:280}}/>
      </div>

      {nullMfrs.length>0&&(
        <p className="null-note">
          {nullMfrs.map(i=>MANUFACTURERS[i].name).join(", ")} — <span>Not Disclosed</span> for this specification
        </p>
      )}

      <div className="cards-row">
        {spec.data.filter(d=>d.min!=null).map((d,i)=>{
          const m=MANUFACTURERS[d.mfr];
          return(
            <div key={`${activeIdx}-${i}`} className="range-card" style={{border:`1px solid ${m.solid}30`}}>
              <span className="range-dot" style={{backgroundColor:m.solid,boxShadow:`0 0 4px ${m.solid}55`}}/>
              <span className="range-name" style={{color:m.solid}}>{m.name}</span>
              <span className="range-val">{d.min} – {d.max}{spec.unit?` ${spec.unit}`:""}</span>
              {d.note&&<span className="range-note">{d.note}</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
